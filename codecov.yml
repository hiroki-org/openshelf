codecov:
  require_ci_to_pass: false
  notify:
    wait_for_ci: false
    after_n_builds: 2

coverage:
  status:
    project:
      default:
        target: 85%
        threshold: 5%
    patch:
      default:
        target: 85%

ignore:
  - ".github/**"
  - "codecov.yml"
  - "**/__tests__/**"
  - "**/*.bench.ts"
  - "**/*.bench.tsx"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

flags:
  api:
    paths:
      - apps/api/src/
  web:
    paths:
      - apps/web/src/
