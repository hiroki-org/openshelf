name = "openshelf-api"
main = "src/index.ts"
compatibility_date = "2026-02-28"

[vars]
FRONTEND_URL = "https://open-shelf-delta.vercel.app"
# ALLOWED_ORIGINS should be configured in Cloudflare Dashboard or via secret/vars
# example: "https://open-shelf-delta.vercel.app,http://localhost:3000"

[[d1_databases]]
binding = "DB"
database_name = "openshelf-db"
database_id = "652de1e3-ee65-4733-98a7-8f93863e1a02"
migrations_dir = "drizzle"

[[r2_buckets]]
bucket_name = "openshelf-files"
binding = "BUCKET"