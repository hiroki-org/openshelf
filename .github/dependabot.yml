version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 4
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      npm-production-minor-patch:
        dependency-type: "production"
        patterns:
          - "**"
        update-types:
          - "minor"
          - "patch"
      npm-development-minor-patch:
        dependency-type: "development"
        patterns:
          - "**"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      github-actions-minor-patch:
        patterns:
          - "**"
  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/apps/web"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      docker-minor-patch:
        patterns:
          - "**"
        update-types:
          - "minor"
          - "patch"
