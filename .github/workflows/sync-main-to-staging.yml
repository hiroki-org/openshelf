name: Sync Main To Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sync-main-to-staging
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync-staging:
    name: Sync main into staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Sync main into staging
        env:
          GH_REPO: ${{ github.repository }}
          HEAD_BRANCH: main
          BASE_BRANCH: staging
          SYNC_SHA: ${{ github.sha }}
        run: bash .github/scripts/sync-main-to-staging.sh
