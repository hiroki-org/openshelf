name: CodSpeed

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/api/vitest.bench.config.mts"
      - ".github/workflows/codspeed.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/api/vitest.bench.config.mts"
      - ".github/workflows/codspeed.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run CodSpeed benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: npm run bench -w apps/api
