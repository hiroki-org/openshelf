name: Close linked issues on merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  close-linked-issues:
    if: ${{ github.event.pull_request.merged == true && (github.event.pull_request.base.ref == 'staging' || github.event.pull_request.base.ref == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Close issues referenced with closing keywords
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const regex = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/gi;
            const issueNumbers = new Set();

            let match;
            while ((match = regex.exec(body)) !== null) {
              issueNumbers.add(Number(match[1]));
            }

            if (issueNumbers.size === 0) {
              core.info("No closing-keyword issue references found.");
              return;
            }

            for (const issueNumber of issueNumbers) {
              if (issueNumber === pr.number) {
                continue;
              }

              const issue = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });

              if (issue.data.pull_request) {
                core.info(`#${issueNumber} is a pull request; skipping.`);
                continue;
              }

              if (issue.data.state === "closed") {
                core.info(`#${issueNumber} is already closed.`);
                continue;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `Closing automatically because #${pr.number} was merged into ${pr.base.ref}.`,
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: "closed",
                state_reason: "completed",
              });

              core.info(`Closed issue #${issueNumber}.`);
            }
