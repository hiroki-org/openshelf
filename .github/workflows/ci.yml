name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint --if-present

  typecheck:
    name: Type Check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type Check
        run: npm run typecheck --workspaces --if-present

  test-api:
    name: Test API
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Test
        run: npm run test:coverage -w apps/api
      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: coverage/api/

  test-web:
    name: Test Web
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Test
        run: npm run test:coverage -w apps/web
      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: coverage/web/

  build-web-check:
    name: Build Web (Preview Check)
    needs: [test-api, test-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build web app
        run: npm run build -w apps/web

  e2e:
    name: E2E Tests
    needs: [test-api, test-web]
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/e2e

      - name: Setup local .dev.vars for Worker
        env:
          E2E_JWT_SECRET: ${{ secrets.E2E_JWT_SECRET }}
        run: |
          echo "JWT_SECRET=${E2E_JWT_SECRET:-e2e-ci-only-secret}" > apps/api/.dev.vars
          echo "FRONTEND_URL=http://localhost:3000" >> apps/api/.dev.vars
          echo "TEST_AUTH_SECRET=e2e-ci-only-secret" >> apps/api/.dev.vars

      - name: Set up local D1 schema
        run: npm run db:migrate:local --workspace apps/api -- -y

      - name: Build web app for E2E
        run: npm run build -w apps/web

      - name: Run Playwright tests
        run: npm run test -w apps/e2e
        env:
          ENABLE_TEST_AUTH: "true"
          TEST_AUTH_SECRET: "e2e-ci-only-secret"
          E2E_API_URL: http://localhost:8787
          NEXT_PUBLIC_API_URL: http://localhost:8787

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 30
