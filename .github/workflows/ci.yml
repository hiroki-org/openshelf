name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint --if-present
  typecheck:
    name: Type Check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type Check
        run: npm run typecheck --workspaces --if-present
  test-api:
    name: Test API
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Test
        run: npm run test -w apps/api -- --coverage
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            apps/api/test-report.junit.xml
          flags: test-results
      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: apps/api/coverage/
  test-web:
    name: Test Web
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Test
        run: npm run test -w apps/web -- --coverage
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            apps/web/test-report.junit.xml
          flags: test-results
      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: apps/web/coverage/
  upload-coverage:
    name: Upload Coverage
    needs: [build-web-check, e2e]
    runs-on: ubuntu-latest
    env:
      CODECOV_COMMIT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      CODECOV_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Download API coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-api
          path: ./coverage-artifacts/api
      - name: Download Web coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-web
          path: ./coverage-artifacts/web
      - name: Upload API coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          flags: api
          files: ./coverage-artifacts/api/lcov.info
          fail_ci_if_error: false
          override_branch: ${{ env.CODECOV_BRANCH }}
          override_commit: ${{ env.CODECOV_COMMIT_SHA }}
          root_dir: apps/api
      - name: Upload Web coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          flags: web
          files: ./coverage-artifacts/web/lcov.info
          fail_ci_if_error: false
          override_branch: ${{ env.CODECOV_BRANCH }}
          override_commit: ${{ env.CODECOV_COMMIT_SHA }}
          root_dir: apps/web
  build-web-check:
    name: Build Web (Preview Check)
    needs: [test-api, test-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build web app
        run: npm run build -w apps/web
  e2e:
    name: E2E Tests (${{ matrix.shardLabel }})
    needs: [test-api, test-web]
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shardIndex: 1
            shardTotal: 2
            shardLabel: 1-of-2
          - shardIndex: 2
            shardTotal: 2
            shardLabel: 2-of-2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/e2e
      - name: Setup local .dev.vars for Worker
        env:
          E2E_JWT_SECRET: ${{ secrets.E2E_JWT_SECRET }}
        run: |
          echo "JWT_SECRET=${E2E_JWT_SECRET:-e2e-ci-only-secret}" > apps/api/.dev.vars
          echo "FRONTEND_URL=http://localhost:3000" >> apps/api/.dev.vars
          echo "TEST_AUTH_SECRET=e2e-ci-only-secret" >> apps/api/.dev.vars
      - name: Set up local D1 schema
        run: npm run db:migrate:local --workspace apps/api
      - name: Build web app for E2E
        run: npm run build -w apps/web
      - name: Run Playwright tests
        run: npm run test -w apps/e2e -- --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          ENABLE_TEST_AUTH: "true"
          TEST_AUTH_SECRET: ${{ secrets.E2E_JWT_SECRET || 'e2e-ci-only-secret' }}
          E2E_API_URL: http://localhost:8787
          NEXT_PUBLIC_API_URL: http://localhost:8787
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.shardLabel }}
          path: apps/e2e/playwright-report/
          retention-days: 30
          if-no-files-found: ignore
      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results-${{ matrix.shardLabel }}
          path: apps/e2e/test-results/
          retention-days: 30
          if-no-files-found: ignore

  codspeed:
    name: CodSpeed
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run benchmarks
        uses: CodSpeedHQ/action@v3
        with:
          run: npx vitest bench --run --config apps/api/vitest.config.ts --passWithNoTests
          token: ${{ secrets.CODSPEED_TOKEN }}
