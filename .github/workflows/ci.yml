name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint --if-present

  typecheck:
    name: Type Check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type Check
        run: npm run typecheck --workspaces --if-present

  test-api:
    name: Test API
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Test
        run: npm run test -w apps/api -- --coverage
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            apps/api/test-report.junit.xml
          flags: test-results
      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-api
          path: apps/api/coverage/

  test-web:
    name: Test Web
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Test
        run: npm run test -w apps/web -- --coverage
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            apps/web/test-report.junit.xml
          flags: test-results
      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-web
          path: apps/web/coverage/

  upload-coverage:
    name: Upload Coverage
    needs: [test-api, test-web]
    if: always() && (needs.test-api.result == 'success' || needs.test-api.result == 'failure') && (needs.test-web.result == 'success' || needs.test-web.result == 'failure')
    runs-on: ubuntu-latest
    env:
      CODECOV_COMMIT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      CODECOV_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      CODECOV_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
    steps:
      - uses: actions/checkout@v6
      - name: Download API coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-api
          path: ./coverage-artifacts/api
      - name: Download Web coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-web
          path: ./coverage-artifacts/web
      - name: Fix coverage paths for monorepo
        run: |
          sed -i 's|SF:src/|SF:apps/api/src/|g' ./coverage-artifacts/api/lcov.info
          sed -i 's|SF:src/|SF:apps/web/src/|g' ./coverage-artifacts/web/lcov.info
      - name: Upload API coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: api
          files: ./coverage-artifacts/api/lcov.info
          fail_ci_if_error: false
          override_branch: ${{ env.CODECOV_BRANCH }}
          override_commit: ${{ env.CODECOV_COMMIT_SHA }}
          override_pr: ${{ env.CODECOV_PR }}
      - name: Upload Web coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: web
          files: ./coverage-artifacts/web/lcov.info
          fail_ci_if_error: false
          override_branch: ${{ env.CODECOV_BRANCH }}
          override_commit: ${{ env.CODECOV_COMMIT_SHA }}
          override_pr: ${{ env.CODECOV_PR }}

  build-web-check:
    name: Build Web (Preview Check)
    needs: [test-api, test-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build web app
        run: npm run build -w apps/web

  e2e:
    name: E2E Tests
    needs: [test-api, test-web]
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/e2e

      - name: Setup local .dev.vars for Worker
        env:
          E2E_JWT_SECRET: ${{ secrets.E2E_JWT_SECRET }}
        run: |
          echo "JWT_SECRET=${E2E_JWT_SECRET:-e2e-ci-only-secret}" > apps/api/.dev.vars
          echo "FRONTEND_URL=http://localhost:3000" >> apps/api/.dev.vars
          echo "TEST_AUTH_SECRET=e2e-ci-only-secret" >> apps/api/.dev.vars

      - name: Set up local D1 schema
        run: npm run db:migrate:local --workspace apps/api

      - name: Build web app for E2E
        run: npm run build -w apps/web

      - name: Run Playwright tests
        run: npm run test -w apps/e2e
        env:
          ENABLE_TEST_AUTH: "true"
          TEST_AUTH_SECRET: ${{ secrets.E2E_JWT_SECRET || 'e2e-ci-only-secret' }}
          E2E_API_URL: http://localhost:8787
          NEXT_PUBLIC_API_URL: http://localhost:8787

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 30
