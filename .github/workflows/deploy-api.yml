name: Deploy API
on:
  push:
    branches: [main, staging]
    paths: ["apps/api/**"]

permissions:
  contents: read

jobs:
  deploy:
    env:
      DEPLOY_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    concurrency:
      group: deploy-api-${{ github.ref_name == 'main' && 'production' || 'staging' }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - name: Apply D1 migrations
        working-directory: apps/api
        run: npx --no-install wrangler d1 migrations apply DB --remote --env $DEPLOY_ENV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy Workers
        working-directory: apps/api
        run: npx --no-install wrangler deploy --env $DEPLOY_ENV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
