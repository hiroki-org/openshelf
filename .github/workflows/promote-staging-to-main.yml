name: Promote Staging To Main

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: promote-staging-to-main
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  open-promote-pr:
    name: Open Staging -> Main PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Create or update staging -> main PR
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PROMOTION_PR_LABELS: ${{ vars.PROMOTION_PR_LABELS || 'release,automated' }}
          PROMOTION_PR_ASSIGNEES: ${{ vars.PROMOTION_PR_ASSIGNEES || '' }}
          PROMOTION_PR_REVIEWERS: ${{ vars.PROMOTION_PR_REVIEWERS || '' }}
        run: bash .github/scripts/create-staging-to-main-pr.sh
