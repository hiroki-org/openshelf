name: CodeQL Alerts to Issues

on:
  code_scanning_alert:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  security-events: read

jobs:
  sync-alert-issues:
    name: Sync alerts and issues
    runs-on: ubuntu-latest
    steps:
      - name: Sync workflow-permissions alerts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const managedLabel = "codeql-alert";
            const scopedLabel = "workflow-permissions";
            const markerRegex = /<!--\s*codeql-alert-number:(\d+)\s*-->/i;

            const ensureLabel = async (name, color, description) => {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color,
                  description,
                });
              }
            };

            const isTargetAlert = (alert) => {
              const toolName = (alert.tool?.name ?? "").toLowerCase();
              if (toolName && toolName !== "codeql") {
                return false;
              }

              const ruleId = (alert.rule?.id ?? "").toLowerCase();
              const ruleName = (alert.rule?.name ?? "").toLowerCase();
              return (
                ruleId.includes("permission") ||
                (ruleName.includes("workflow") && ruleName.includes("permission"))
              );
            };

            const getAlertPath = (alert) =>
              alert.most_recent_instance?.location?.path ?? "(unknown file)";
            const getAlertLine = (alert) =>
              alert.most_recent_instance?.location?.start_line ?? "n/a";
            const getAlertUrl = (alert) =>
              alert.html_url ??
              `https://github.com/${owner}/${repo}/security/code-scanning/${alert.number}`;

            const renderBody = (alert) => {
              const ruleName = alert.rule?.name ?? "(unknown rule)";
              const ruleId = alert.rule?.id ?? "(unknown id)";
              const severity = alert.rule?.security_severity_level ?? alert.rule?.severity ?? "unknown";
              const path = getAlertPath(alert);
              const line = getAlertLine(alert);
              const state = alert.state ?? "unknown";
              const alertUrl = getAlertUrl(alert);

              return `This issue tracks a CodeQL alert for missing workflow permissions.

- Alert: [#${alert.number}](${alertUrl})
- Rule: ${ruleName}
- Rule ID: \`${ruleId}\`
- File: \`${path}\`
- Line: ${line}
- Severity: ${severity}
- State: ${state}

Expected action:
- Add explicit least-privilege \`permissions:\` blocks to affected workflow files.
- Keep the fix minimal and avoid granting unnecessary scopes.

<!-- managed-by: codeql-alerts-to-issues -->
<!-- codeql-alert-number:${alert.number} -->
<!-- codeql-rule-id:${ruleId} -->
<!-- codeql-path:${path} -->
`;
            };

            const renderTitle = (alert) => {
              const path = getAlertPath(alert);
              return `CodeQL: workflow permissions missing in ${path}`;
            };

            const extractAlertNumber = (issue) => {
              const body = issue.body ?? "";
              const match = body.match(markerRegex);
              if (!match) {
                return null;
              }
              return Number(match[1]);
            };

            const listManagedIssues = async (state) =>
              github.paginate(github.rest.issues.listForRepo, {
                owner,
                repo,
                state,
                labels: `${managedLabel},${scopedLabel}`,
                per_page: 100,
              });

            const upsertOpenIssueForAlert = async (alert, allIssues) => {
              const existing = allIssues.find((issue) => extractAlertNumber(issue) === alert.number);
              const title = renderTitle(alert);
              const body = renderBody(alert);

              if (!existing) {
                await github.rest.issues.create({
                  owner,
                  repo,
                  title,
                  body,
                  labels: [managedLabel, scopedLabel],
                });
                core.info(`Created issue for alert #${alert.number}`);
                return;
              }

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body,
                state: "open",
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Alert #${alert.number} is currently open. Keeping this tracking issue open.`,
              });

              core.info(`Updated issue #${existing.number} for alert #${alert.number}`);
            };

            const closeIssueIfResolved = async (issue, reason) => {
              if (issue.state !== "open") {
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: reason,
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed",
              });

              core.info(`Closed issue #${issue.number}`);
            };

            await ensureLabel(managedLabel, "d73a4a", "Tracks CodeQL alerts");
            await ensureLabel(scopedLabel, "5319e7", "Workflow permissions alerts from CodeQL");

            if (context.eventName === "code_scanning_alert") {
              const alert = context.payload.alert;
              if (!alert) {
                core.info("No alert payload found. Skipping.");
                return;
              }

              if (!isTargetAlert(alert)) {
                core.info(`Skipping alert #${alert.number}: rule does not match target.`);
                return;
              }

              const allIssues = await listManagedIssues("all");
              const existing = allIssues.find((issue) => extractAlertNumber(issue) === alert.number);

              if ((alert.state ?? "").toLowerCase() === "open") {
                await upsertOpenIssueForAlert(alert, allIssues);
              } else if (existing) {
                await closeIssueIfResolved(
                  existing,
                  `CodeQL alert #${alert.number} is now \`${alert.state}\`. Closing this tracking issue.`,
                );
              } else {
                core.info(`Resolved alert #${alert.number} has no tracking issue.`);
              }

              return;
            }

            const openAlerts = await github.paginate(
              github.request,
              "GET /repos/{owner}/{repo}/code-scanning/alerts",
              {
                owner,
                repo,
                state: "open",
                tool_name: "CodeQL",
                per_page: 100,
              },
            );

            const targetOpenAlerts = openAlerts.filter(isTargetAlert);
            const targetByNumber = new Map(targetOpenAlerts.map((alert) => [alert.number, alert]));
            const allIssues = await listManagedIssues("all");
            const openIssues = allIssues.filter((issue) => issue.state === "open");

            for (const issue of openIssues) {
              const alertNumber = extractAlertNumber(issue);
              if (!alertNumber) {
                continue;
              }

              if (!targetByNumber.has(alertNumber)) {
                await closeIssueIfResolved(
                  issue,
                  `No matching open CodeQL alert (#${alertNumber}) was found in the latest sync. Closing this issue.`,
                );
              }
            }

            for (const alert of targetOpenAlerts) {
              await upsertOpenIssueForAlert(alert, allIssues);
            }
